name: compute-image
# Build the pinned, reproducible compute environment (infra/pyenv/Dockerfile.compute) MULTI-ARCH and publish
# it to ghcr. codeqc + selfmonitor then run `container:` on this image, so the toolchain the validators need
# (openssl 3.5 for cws-conform/interop, java+TLA for cws-modelcheck) is present and FIXED — not the drifting
# ubuntu defaults. The Dockerfile detects the target arch (TARGETARCH); deps install hash-verified from the lock.
on:
  push:
    branches: [ "main" ]
    paths:
      - "infra/pyenv/**"
      - "vendor/wheelhouse/SHA256SUMS"
      - ".github/workflows/compute-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write              # publish to ghcr under this repo's owner

concurrency:
  group: compute-image
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: [self-hosted]          # dev: private repo → self-hosted (free Actions minutes). Revert to ubuntu-latest when cyberware goes public.
    steps:
      - name: reclaim workspace ownership before checkout (self-hosted runner)
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v3     # emulate the non-native arch (arm64) for the multi-arch build
      - uses: docker/setup-buildx-action@v3
      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cyberware-compute
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: build + push (multi-arch, hash-locked deps)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/pyenv/Dockerfile.compute
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
