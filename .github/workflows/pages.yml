name: pages
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:                                       # pull the skillChip cartridge (submodule)
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}   # private chip→set SUBMODULE_PAT; public→default
      # No build: the dashboard self-discovers the registry at runtime. Just publish the static page
      # alongside the registry + docs it fetches, with a directory listing of the skills.
      - name: assemble the site
        run: |
          mkdir -p _site/docs
          cp docs/site/index.html _site/index.html
          cp -r skillChip _site/skillChip
          cp cyberware.md _site/cyberware.md
          cp docs/*.md _site/docs/
          python3 -c "import os,json; json.dump(sorted(d for d in os.listdir('skillChip') if os.path.isfile(os.path.join('skillChip',d,'perks.json'))), open('_site/skills.json','w'))"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
