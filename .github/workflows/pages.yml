name: pages
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: [self-hosted]          # dev: private repo → self-hosted (free Actions minutes). Revert to ubuntu-latest when cyberware goes public.
    steps:
      - name: reclaim workspace ownership before checkout (self-hosted runner)
        run: |
          # A prior root-uid step (e.g. a docker run) can leave root-owned files in .git that the runner
          # user cannot clean — actions/checkout then dies (EACCES rmdir .git/branches, .git/index.lock).
          # Reclaim ownership, then drop a poisoned .git so checkout recreates it fresh.
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true
          [ -n "$GITHUB_WORKSPACE" ] && sudo rm -rf "$GITHUB_WORKSPACE/.git" || true
      - uses: actions/checkout@v4                  # main repo: the native runner token owns cyberware
        with:
          persist-credentials: false                # don't leave a github.token extraheader that shadows the PAT
      - name: checkout the skillChip cartridge (submodule)
        env:                                         # PAT scoped read-only to skillChip; falls back for a public chip
          TOKEN: ${{ secrets.SUBMODULE_PAT || github.token }}
        run: |
          AUTH="https://x-access-token:${TOKEN}@github.com/"
          git -c "url.${AUTH}.insteadOf=git@github.com:" \
              -c "url.${AUTH}.insteadOf=https://github.com/" \
              submodule update --init --recursive --depth=1 skillChip
      # No build: the dashboard self-discovers the registry at runtime. Just publish the static page
      # alongside the registry + docs it fetches, with a directory listing of the skills.
      - name: assemble the site
        run: |
          mkdir -p _site/docs
          echo 'www.cyberware.systems' > _site/CNAME      # custom domain — MUST match the repo's Pages config (www), or the deploy is rejected
          cp index.html _site/index.html                 # the cyberpunk homepage (landing)
          cp docs/site/index.html _site/dashboard.html    # the live registry dashboard (root-relative fetches)
          cp docs/atlas.html _site/atlas.html             # the intent atlas dashboard (a discovery subpage)
          cp docs/favicon.png _site/favicon.png           # tab icon (favicon, small) — both pages link /favicon.png
          cp docs/icon.png _site/icon.png                 # full crest — og:image / twitter:image / apple-touch / nav mark
          cp docs/watermark.png _site/watermark.png       # 56px pixel crest — the faint background watermark
          cp docs/logo_flow5.gif _site/logo_flow5.gif     # the hero/README flow animation (top of homepage + README)
          cp docs/architecture.png _site/architecture.png # homepage §03 + README — the four-plane control-layer diagram
          cp docs/skillchipeconomy.png _site/skillchipeconomy.png  # homepage §09 — the skillChip economy diagram
          cp -r skillChip _site/skillChip
          cp infra/document/pipeline.blueprint.svg  _site/pipeline.svg
          cp infra/document/pipeline.blueprint.json _site/pipeline.blueprint.json
          cp cyberware.md _site/cyberware.md
          cp docs/*.md _site/docs/
          python3 infra/document/render_docs.py --out _site   # the docs hub (explore.html) + a rendered page per doc
          cp docs/toolbar.js _site/toolbar.js                  # the global auto-hiding site toolbar (nav + status)
          # the atlas dashboard is generated by the magnumopus 'atlas' skill — inject the toolbar at deploy time
          python3 -c "import os; p='_site/atlas.html'; s=open(p).read() if os.path.exists(p) else ''; open(p,'w').write(s.replace('</body>','<script src=\"/toolbar.js\" defer></script></body>',1)) if s and 'toolbar.js' not in s else None"
          # skills.json carries {name, dir} so the source-grouped chip (skillChip/<source>/<skill>) AND the
          # legacy flat layout (skillChip/<skill>) both resolve. The dashboard builds its base path from dir.
          python3 -c "import os,json; r='skillChip'; flat=[{'name':d,'dir':d} for d in os.listdir(r) if os.path.isfile(os.path.join(r,d,'perks.json'))]; nested=[{'name':s,'dir':d+'/'+s} for d in os.listdir(r) if os.path.isdir(os.path.join(r,d)) for s in os.listdir(os.path.join(r,d)) if os.path.isfile(os.path.join(r,d,s,'perks.json'))]; out=sorted(flat+nested, key=lambda e:e['name']); json.dump(out, open('_site/skills.json','w'))"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
