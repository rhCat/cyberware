name: server-image
# Quick deployment: build the govd governance-server image (root Dockerfile) and publish it SIGNED to ghcr,
# so an individual can `docker run` an overseen govd in one line. Signed keyless with cosign via GitHub OIDC
# (no stored key — the chip's publisher key stays local). Deliberate publishes only: on a vN.N.N tag or on demand.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      skillchip_ref:
        description: "skillChip ref to bake into the image (tag/branch/sha). Default: the lean 'core' channel tag."
        default: core
        required: false

permissions:
  contents: read
  packages: write          # publish the image to ghcr under this repo's owner
  id-token: write          # cosign keyless signing (OIDC -> Fulcio/Rekor); no secret stored

concurrency:
  group: server-image
  cancel-in-progress: false

jobs:
  build-push-sign:
    runs-on: [self-hosted]          # dev: private repo → self-hosted (free Actions minutes). Revert to ubuntu-latest when cyberware goes public.
    steps:
      - name: reclaim workspace ownership before checkout (self-hosted runner)
        run: |
          # A prior root-uid step (e.g. a docker run) can leave root-owned files in .git that the runner
          # user cannot clean — actions/checkout then dies (EACCES rmdir .git/branches, .git/index.lock).
          # Reclaim ownership, then drop a poisoned .git so checkout recreates it fresh.
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true
          [ -n "$GITHUB_WORKSPACE" ] && sudo rm -rf "$GITHUB_WORKSPACE/.git" || true
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: pull the skillChip CORE tag (the lean cartridge the image bakes in)
        # The core image bakes skillChip@core — the lean cws+general channel — NOT the vendored submodule
        # pointer. Re-tag `core` on the skillChip repo and the next build picks it up; the parent submodule
        # can advance to the full marketplace (main) without changing what the signed core image carries.
        env:
          TOKEN: ${{ secrets.SUBMODULE_PAT || github.token }}   # PAT for the private chip; falls back for a public one
          SKILLCHIP_REF: ${{ github.event.inputs.skillchip_ref || 'core' }}
        run: |
          rm -rf skillChip
          git clone --depth 1 --branch "${SKILLCHIP_REF}" \
            "https://x-access-token:${TOKEN}@github.com/rhCat/skillChip.git" skillChip
          rm -rf skillChip/.git                                 # don't bake the clone's git metadata into the image
          python3 -c "import json;d=json.load(open('skillChip/index.json'));print('baked skillChip@${SKILLCHIP_REF}:',d['count'],'skills · chip_sha',d['chip_sha'][:16])"

      - uses: docker/setup-qemu-action@v3          # register QEMU so the amd64 runner can cross-build the arm64 leg
      - uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cyberware   # metadata-action lowercases the owner
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,format=long

      - name: build + push (amd64+arm64) — the Dockerfile's skill_index --check gate fails the build on chip drift
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64    # multi-arch: maintain amd64 (x86 nodes) AND arm64 (Mac/DGX) simultaneously. The arm64 leg cross-builds under QEMU on the amd64 runner.
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: keyless-sign the pushed image (OIDC — verifiable, no stored key)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner="${{ github.repository_owner }}"
          cosign sign --yes "ghcr.io/${owner,,}/cyberware@${DIGEST}"
