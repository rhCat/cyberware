name: code-qc
on:
  push:
    branches: [ "main" ]
  pull_request:
permissions:
  contents: read
jobs:
  codeqc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
      - name: lint (ruff)
        run: ruff check infra
      - name: types (mypy)
        run: mypy infra || true
      - name: test (pytest)
        run: |
          if [ -d tests ]; then pytest tests --cov=infra; else echo "no tests/ dir — skipping"; fi
