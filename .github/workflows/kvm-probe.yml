name: kvm-probe
# Diagnostic: does a GitHub-hosted ubuntu-latest runner actually expose a USABLE /dev/kvm?
# This decides whether P2-T09's microVM bench can close on free CI (no EC2/bare-metal needed).
# Runs on its own branch + on demand; never on main.
on:
  workflow_dispatch:
  push:
    branches: [ "probe/kvm" ]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: runner + CPU virtualization flags
        run: |
          echo "== uname =="; uname -a
          echo "== nproc =="; nproc
          echo "== virt flags (count of vmx|svm in /proc/cpuinfo) =="
          grep -E -c '(vmx|svm)' /proc/cpuinfo || echo 0
          echo "== /dev/kvm node =="
          ls -l /dev/kvm || echo "NO /dev/kvm device node"

      - name: kvm-ok (cpu-checker)
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq cpu-checker
          sudo kvm-ok || true

      - name: grant the runner access to /dev/kvm (it's root:kvm 0660; runner isn't in the kvm group)
        run: |
          sudo chmod 666 /dev/kvm        # the standard GitHub-runner idiom (Android-emulator workflows do this)
          ls -l /dev/kvm

      - name: is /dev/kvm actually USABLE (open + KVM_GET_API_VERSION ioctl)?
        run: |
          python3 - <<'PY'
          import fcntl, os, sys
          KVM_GET_API_VERSION = 0xAE00          # the canonical "is KVM alive" ioctl
          try:
              fd = os.open("/dev/kvm", os.O_RDWR)
          except Exception as e:
              print(f"FAIL: cannot open /dev/kvm: {e}"); sys.exit(1)
          try:
              ver = fcntl.ioctl(fd, KVM_GET_API_VERSION, 0)
          except Exception as e:
              print(f"FAIL: /dev/kvm opened but ioctl failed: {e}"); sys.exit(1)
          finally:
              os.close(fd)
          print(f"PASS: /dev/kvm is usable — KVM_GET_API_VERSION = {ver} (expect 12)")
          if ver != 12:
              print("WARN: unexpected KVM API version");
          PY

      - name: firecracker downloads + runs (microVM backend smoke)
        continue-on-error: true
        run: |
          arch=$(uname -m)
          ver=$(curl -fsSL https://api.github.com/repos/firecracker-microvm/firecracker/releases/latest \
                | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          echo "latest firecracker: $ver ($arch)"
          curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/${ver}/firecracker-${ver}-${arch}.tgz" -o fc.tgz
          tar xf fc.tgz
          bin=$(find . -type f -name "firecracker-${ver}-${arch}" | head -1)
          "$bin" --version && echo "firecracker OK — microVM backend is installable on this runner"
