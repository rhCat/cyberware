<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cyberware · govd monitor</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<style>
  :root{
    --bg:#0a0e14; --panel:#0f1722; --panel2:#131d2b; --line:#1e2c3d; --ink:#cdd9e5;
    --dim:#6b7d92; --accent:#39d0d8; --allow:#36d399; --push:#fbbd23; --reject:#f87272;
    --destructive:#c084fc; --restored:#7f8fa3; --mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 var(--mono);
    background-image:radial-gradient(circle at 18% -10%,rgba(57,208,216,.08),transparent 42%)}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(10,14,20,.94);backdrop-filter:blur(6px);z-index:5;flex-wrap:wrap}
  h1{font-size:15px;margin:0;letter-spacing:.05em} h1 b{color:var(--accent)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--dim)} .dot.live{background:var(--allow)} .dot.err{background:var(--reject)}
  .grow{flex:1} .stamp{color:var(--dim);font-size:11px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{padding:3px 9px;border:1px solid var(--line);border-radius:14px;background:var(--panel);font-size:11px}
  .chip b{font-size:13px}
  .chip.allow b{color:var(--allow)} .chip.push b{color:var(--push)} .chip.reject b{color:var(--reject)} .chip.dest b{color:var(--destructive)}
  .app{display:flex;align-items:stretch;min-height:60vh}
  .nav{width:300px;flex:none;border-right:1px solid var(--line);overflow:auto;max-height:calc(100vh - 60px)}
  .main{flex:1;min-width:0;overflow:auto;max-height:calc(100vh - 60px);padding:14px 18px}
  @media(max-width:760px){.app{flex-direction:column}.nav{width:auto;max-height:38vh;border-right:0;border-bottom:1px solid var(--line)}}
  .navitem{padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .navitem:hover{background:var(--panel)} .navitem.sel{background:var(--panel2);box-shadow:inset 3px 0 0 var(--accent)}
  .navitem .r1{display:flex;align-items:center;gap:8px} .navitem .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .navitem .r2{display:flex;gap:10px;margin-top:3px;color:var(--dim);font-size:10px}
  .navhd{padding:8px 14px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-size:10px;border-bottom:1px solid var(--line)}
  .badge{padding:1px 7px;border-radius:6px;font-size:10px;border:1px solid}
  .b-allow{color:var(--allow);border-color:var(--allow)} .b-push{color:var(--push);border-color:var(--push)} .b-reject{color:var(--reject);border-color:var(--reject)}
  .tag-dest{color:var(--destructive);border:1px solid var(--destructive);border-radius:6px;padding:0 6px;font-size:10px}
  .tag-restored{color:var(--restored);border:1px solid var(--restored);border-radius:6px;padding:0 6px;font-size:10px}
  .tag-fail{color:var(--reject);border:1px solid var(--reject);border-radius:6px;padding:0 6px;font-size:10px}
  .note{color:var(--ink);font-size:11px;padding:6px 0}
  .prob{color:var(--reject);font-size:11px;padding:3px 0;border-bottom:1px solid var(--line)}
  section{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .hd{padding:9px 13px;border-bottom:1px solid var(--line);color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-size:10px}
  .pad{padding:10px 13px}
  .meta{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:12px}
  .meta .k{color:var(--dim)}
  .keys span,.pills .pill{font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin:0 4px 4px 0;display:inline-block;color:var(--dim)}
  .pills{display:flex;gap:5px;flex-wrap:wrap}
  .pill.ok{color:var(--allow);border-color:var(--allow)} .pill.error{color:var(--reject);border-color:var(--reject)}
  .pill.granted{color:var(--accent);border-color:var(--accent)} .pill.pending{opacity:.5}
  .pill.refused{color:var(--reject);border-color:var(--reject)}
  .tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .tool{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--panel2)}
  .tool .ct{display:flex;gap:10px;margin-top:4px;font-size:11px}
  .tool .ct .ok{color:var(--allow)} .tool .ct .er{color:var(--reject)} .tool .ct .gr{color:var(--accent)}
  table{width:100%;border-collapse:collapse} td{padding:5px 8px;border-bottom:1px solid var(--line);font-size:11px;vertical-align:top}
  .tl div{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--line);font-size:11px;align-items:baseline}
  .tl .t{color:var(--dim);min-width:62px} .tl .ev{min-width:92px}
  .ev-granted{color:var(--accent)} .ev-step_result{color:var(--allow)} .ev-step_refused{color:var(--reject)}
  .steps{display:flex;flex-direction:column;gap:10px}
  .stepblk{border:1px solid var(--line);border-radius:8px;background:var(--panel2);overflow:hidden}
  .stephd{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line)}
  .stephd .pill{font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 6px;display:inline-block;color:var(--dim)}
  .stephd .sstate{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
  .stephd .sstate.ok{color:var(--allow)} .stephd .sstate.error{color:var(--reject)} .stephd .sstate.granted{color:var(--accent)} .stephd .sstate.refused{color:var(--reject)}
  .stepblk .tl{padding:2px 10px} .stepblk .tl div:last-child{border-bottom:0}
  .stepblk .note{color:var(--dim);padding:6px 0;font-size:11px}
  pre{margin:0;padding:10px 13px;background:var(--panel2);border-radius:8px;max-height:240px;overflow:auto;font-size:11px;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .empty{color:var(--dim);padding:18px;text-align:center}
  .ask{padding:40px;text-align:center;color:var(--dim)}
  .ask input{font:13px var(--mono);padding:8px 12px;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--ink);width:340px;max-width:80vw}
  .ask button{font:13px var(--mono);padding:8px 16px;margin-left:8px;background:var(--accent);border:0;border-radius:6px;color:#04181a;cursor:pointer}
  .tabs{display:flex;gap:4px;margin:0 0 14px;border-bottom:1px solid var(--line)}
  .tab{padding:7px 18px;cursor:pointer;color:var(--dim);border:1px solid transparent;border-bottom:0;border-radius:8px 8px 0 0;
    font-size:10px;text-transform:uppercase;letter-spacing:.12em;user-select:none}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--accent);background:var(--panel);border-color:var(--line);box-shadow:inset 0 2px 0 var(--accent)}
  .flow{background:var(--panel2);border-radius:8px;padding:10px;text-align:center;overflow:auto}
  .flow svg{max-width:100%;height:auto;border-radius:6px}
  .chip.err{cursor:pointer} .chip.err b{color:var(--reject)}
  .errfilter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .efbtn{font:10px var(--mono);text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;background:var(--panel2);
    border:1px solid var(--line);border-radius:6px;color:var(--dim);cursor:pointer}
  .efbtn:hover{color:var(--ink)} .efbtn.on{color:var(--accent);border-color:var(--accent)}
  tr.errrow{cursor:pointer} tr.errrow:hover td{background:var(--panel2)}
  td.t{color:var(--dim);white-space:nowrap} td.errdet{color:var(--ink)}
  .errkind{font-size:10px;border-radius:6px;padding:1px 7px;border:1px solid;white-space:nowrap}
  .errkind.k-step_error{color:var(--reject);border-color:var(--reject)}
  .errkind.k-refused{color:var(--push);border-color:var(--push)}
  .errkind.k-reject{color:var(--destructive);border-color:var(--destructive)}
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <h1>cyberware · <b>govd</b> monitor</h1>
  <div class="chips" id="chips"></div>
  <span class="grow"></span>
  <span class="stamp" id="stamp">connecting…</span>
</header>
<div id="root"></div>
<script>
"use strict";
const qs = new URLSearchParams(location.search);
let token = qs.get("token") || sessionStorage.getItem("govd_monitor_token") || "";
const state = { snap:null, selected:null, detail:null, tab:"Run", view:"overview", errFilter:"all" };
const flowCache = {};   // run_id -> task-blueprint svg (fetched once; the blueprint is static per run)
let lastSig = "";       // signature of the last RENDERED view; an idle poll whose signature matches is a no-op
let lastNav = "";       // navigation identity (run + tab + page) of the last render — tells an in-place refresh
                        // (keep the panes' scroll) apart from a real navigation (start the detail pane at the top)
const root = document.getElementById("root");
const dot = document.getElementById("dot"), stamp = document.getElementById("stamp"), chips = document.getElementById("chips");
const enc = encodeURIComponent;
function el(tag, cls, text){ const e=document.createElement(tag); if(cls)e.className=cls; if(text!=null)e.textContent=text; return e; }
const DEC = {allow:"b-allow", push_back:"b-push", reject:"b-reject"};
function badge(d){ return el("span","badge "+(DEC[d]||""), d||"?"); }
const LOCAL_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;   // the viewer's timezone
// govd records UTC (ISO + 'Z'); render in the viewer's LOCAL tz so timestamps match the user's clock.
function fmt(ts){ if(!ts) return "-"; const d=new Date(ts); return isNaN(d.getTime()) ? String(ts)
  : d.toLocaleString(undefined, {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}); }
function stepStates(seq, events){
  seq = seq||[]; events = events||[];
  const res={}, granted=new Set(), refused=new Set();
  for(const e of events){ if(e.type==="step_result") res[e.step]=e; if(e.type==="granted") granted.add(e.step); if(e.type==="step_refused") refused.add(e.step); }
  return seq.map((tool,i)=>{ const n=i+1, r=res[String(n)];
    const st = r ? (r.status==="ok"?"ok":"error")
             : refused.has(String(n)) ? "refused" : granted.has(String(n)) ? "granted" : "pending";
    return {n, tool, state:st}; });
}

function askToken(){
  dot.className="dot"; stamp.textContent="enter monitor token";
  root.innerHTML="";
  const box=el("div","ask");
  box.appendChild(el("p",null,"Enter the monitor token (printed in the govd boot log; local default: admin):"));
  const inp=el("input"); inp.type="password"; inp.placeholder="monitor token";
  const btn=el("button",null,"connect");
  const go=()=>{ token=inp.value.trim(); sessionStorage.setItem("govd_monitor_token",token); tick(); };
  btn.onclick=go; inp.onkeydown=e=>{ if(e.key==="Enter") go(); };
  box.append(inp,btn); root.appendChild(box); inp.focus();
}

function select(id){ state.selected=id; state.detail=null; render(); if(id) refreshDetail(); }

async function refreshDetail(){
  if(!state.selected) return;
  try{ const d=await fetch("/monitor/run/"+enc(state.selected)+"?token="+enc(token),{cache:"no-store"});
       state.detail = d.ok ? await d.json() : null; }catch(e){ state.detail=null; }
  render();
}

function viewSig(){
  // everything the DOM is built from, EXCEPT the per-poll clock (snap.now) — so an idle poll is a no-op.
  const s = state.snap ? {...state.snap, now:0} : null;
  return JSON.stringify([state.selected, state.view, state.errFilter, state.tab, decPage, s, state.detail]);
}
function viewNav(){
  // navigation identity: changes when the user opens a different run, switches tabs, or pages decisions — NOT on a
  // data refresh. A same-viewNav re-render is an in-place update, so the panes keep their scroll instead of jumping.
  return state.selected + "|" + state.view + "|" + state.errFilter + "|" + state.tab + "|" + decPage;
}

function render(){
  if(!state.snap) return;
  // capture the panes' scroll BEFORE the innerHTML rebuild so an in-place refresh doesn't yank the view to the top.
  // A real navigation (different run / tab / page) has a new viewNav, so the detail pane intentionally resets.
  const _pn=root.querySelector(".nav"), _pm=root.querySelector(".main");
  const _navTop=_pn?_pn.scrollTop:0, _mainTop=_pm?_pm.scrollTop:0, _sameView=(lastNav===viewNav());
  const s=state.snap;
  chips.innerHTML="";
  const t=s.totals||{};
  const mk=(c,l,n)=>{ const x=el("span","chip "+c); x.appendChild(el("b",null,String(n||0))); x.appendChild(document.createTextNode(" "+l)); return x; };
  chips.append(mk("","runs",s.runs_live), mk("allow","allow",t.allow), mk("push","push-back",t.push_back),
    mk("reject","reject",t.reject), mk("dest","destructive",(s.runs||[]).filter(r=>r.destructive).length));
  const ec=mk("err","⚠ errors",s.errors_total); ec.title="review the error log"; ec.onclick=()=>{ state.view="errors"; select(null); };
  chips.appendChild(ec);

  root.innerHTML="";
  const app=el("div","app"), nav=el("div","nav"), main=el("div","main");

  nav.appendChild(el("div","navhd","Review · select a run"));
  const ov=el("div","navitem"+((state.selected===null&&state.view!=="errors")?" sel":"")); ov.appendChild(el("span","nm","▤ Overview"));
  ov.onclick=()=>{ state.view="overview"; select(null); }; nav.appendChild(ov);
  const ei=el("div","navitem"+((state.selected===null&&state.view==="errors")?" sel":"")); const eir=el("div","r1");
  eir.appendChild(el("span","nm","⚠ Errors")); if(s.errors_total) eir.appendChild(el("span","tag-fail",String(s.errors_total)));
  ei.appendChild(eir); ei.onclick=()=>{ state.view="errors"; select(null); }; nav.appendChild(ei);
  for(const r of (s.runs||[])){
    const it=el("div","navitem"+(state.selected===r.run_id?" sel":""));
    const r1=el("div","r1"); r1.appendChild(el("span","nm",(r.skill||"?")+" / "+(r.perk||"?"))); r1.appendChild(badge(r.decision));
    const r2=el("div","r2"); r2.appendChild(el("span",null,fmt(r.ts))); r2.appendChild(el("span",null,r.progress||"-"));
    if(r.failed) r2.appendChild(el("span","tag-fail","failed"));
    if(r.destructive) r2.appendChild(el("span","tag-dest","D"));
    if(r.restored) r2.appendChild(el("span","tag-restored","restored"));
    it.append(r1,r2); it.onclick=()=>select(r.run_id); nav.appendChild(it);
  }

  if(state.selected!==null) detailView(main);
  else if(state.view==="errors") errorsView(main, s);
  else overview(main, s);
  app.append(nav,main); root.appendChild(app);
  nav.scrollTop=_navTop;                               // the run list never jumps on an in-place refresh
  if(_sameView) main.scrollTop=_mainTop;              // the detail/overview pane keeps its scroll across a refresh
  lastSig=viewSig(); lastNav=viewNav();                // remember what we just drew, so an unchanged poll no-ops
}

function sect(title){ const s=el("section"); s.appendChild(el("div","hd",title)); const b=el("div","pad"); s.appendChild(b); return {s,b}; }

function overview(main, s){
  const tu=sect("Tool usage"); const tools=Object.entries(s.tools||{});
  if(!tools.length) tu.b.appendChild(el("div","empty","no tool runs yet"));
  else{ const g=el("div","tools"); tools.sort((a,b)=>(b[1].ok+b[1].error+b[1].granted)-(a[1].ok+a[1].error+a[1].granted));
    for(const [n,c] of tools){ const card=el("div","tool"); card.appendChild(el("div",null,n));
      const ct=el("div","ct"); ct.append(el("span","ok","✓ "+c.ok),el("span","er","✕ "+c.error),el("span","gr","→ "+c.granted)); card.appendChild(ct); g.appendChild(card); }
    tu.b.appendChild(g); }
  main.appendChild(tu.s);

  const dc=sect("Recent decisions"); const dt=el("table");
  for(const x of (s.decisions||[])){ const tr=el("tr");
    tr.appendChild(el("td",null,fmt(x.ts))); const c2=el("td"); c2.appendChild(el("span",null,(x.skill||"?")+" / "+(x.perk||"?"))); tr.appendChild(c2);
    const c3=el("td"); c3.appendChild(badge(x.decision)); if(x.destructive) c3.appendChild(el("span","tag-dest"," D")); tr.appendChild(c3);
    const note=(x.problems&&x.problems.length)?x.problems.join(", "):(x.needs_approve&&x.needs_approve.length?("approve: "+x.needs_approve.join(",")):""); tr.appendChild(el("td",null,note)); dt.appendChild(tr); }
  if(!(s.decisions||[]).length) dc.b.appendChild(el("div","empty","no decisions yet")); else dc.b.appendChild(dt);
  {                                                     // P5-T02: pager — page 1 is the live (SSE) feed; older pages are a paused fetch
    const p=s.decisions_page||{page:decPage,pages:1,total:(s.decisions||[]).length};
    if(p.pages>1 || decPage>1){
      const pg=el("div","pager");
      // drive targets, disabled-state, AND label all from the server-clamped p.page (one source of truth)
      const older=el("button",null,"‹ older"); older.disabled=p.page>=p.pages; older.onclick=()=>gotoDecPage(p.page+1);
      const newer=el("button",null,p.page>1?"newer ›":"● live"); newer.disabled=p.page<=1; newer.onclick=()=>gotoDecPage(p.page-1);
      pg.appendChild(older); pg.appendChild(el("span","pginfo"," page "+p.page+" / "+p.pages+" · last "+p.total+" decisions ")); pg.appendChild(newer);
      dc.b.appendChild(pg);
    }
  }
  main.appendChild(dc.s);

  const fd=sect("Live event feed"); const tl=el("div","tl");
  for(const e of (s.feed||[])){ const row=el("div"); row.appendChild(el("span","t",fmt(e.ts))); row.appendChild(el("span","ev ev-"+e.type,e.type));
    let txt=(e.skill||"?")+"/"+(e.perk||"?")+" step "+e.step; if(e.type==="step_result")txt+=" · "+(e.status||"")+" (exit "+e.exit+")"; if(e.type==="step_refused")txt+=" · "+(e.reason||"");
    row.appendChild(el("span",null,txt)); tl.appendChild(row); }
  if(!(s.feed||[]).length) fd.b.appendChild(el("div","empty","no events yet")); else fd.b.appendChild(tl);
  main.appendChild(fd.s);
}

const ERR_KIND={step_error:"step error", refused:"refused", reject:"claim rejected"};
function errDetail(e){
  const at="step "+e.step+(e.tool?"·"+e.tool:"");
  if(e.kind==="step_error") return at+" · "+(e.status||"error")+" (exit "+e.exit+")";
  if(e.kind==="refused") return at+" · "+(e.reason||e.etype||"refused");
  if(e.kind==="reject") return (e.problems&&e.problems.length)?e.problems.join(", "):"rejected";
  return "";
}
function errorsView(main, s){
  // A consolidated, value-free error log: failures collated newest-first from the snapshot window. Each row
  // links to its run (the Run tab carries the per-step provenance). Status-level only — exit / refusal reason /
  // claim problem ids — NEVER command output; govd holds none (the value-free boundary).
  const all=s.errors||[], f=state.errFilter||"all";
  const KIND={all:null, step:"step_error", refused:"refused", reject:"reject"}, LBL={all:"all",step:"step errors",refused:"refusals",reject:"rejects"};
  const counts={all:all.length}; for(const k of ["step","refused","reject"]) counts[k]=all.filter(e=>e.kind===KIND[k]).length;
  const rows=all.filter(e=> f==="all" || e.kind===KIND[f]);
  const total=s.errors_total||all.length;   // errors[] is capped (ERRORS_MAX); errors_total is the true count
  const shown=(total>all.length)?("showing "+all.length+" of "+total):String(total);   // be honest when truncated
  const es=sect("Error log · "+shown+" across the last "+((s.runs||[]).length)+" runs");
  const bar=el("div","errfilter");
  for(const k of ["all","step","refused","reject"]){ const b=el("button","efbtn"+(f===k?" on":""),LBL[k]+" ("+counts[k]+")");
    b.onclick=()=>{ state.errFilter=k; render(); }; bar.appendChild(b); }
  es.b.appendChild(bar);
  if(!rows.length){ es.b.appendChild(el("div","empty", all.length? ("no "+LBL[f]) : "no errors — every run is clean")); main.appendChild(es.s); return; }
  const t=el("table");
  for(const e of rows){ const tr=el("tr"); tr.className="errrow"; tr.onclick=()=>select(e.run_id);
    tr.appendChild(el("td","t",fmt(e.ts)));
    const c2=el("td"); c2.appendChild(el("span",null,(e.skill||"?")+" / "+(e.perk||"?"))); tr.appendChild(c2);
    const c3=el("td"); c3.appendChild(el("span","errkind k-"+e.kind, ERR_KIND[e.kind]||e.kind)); tr.appendChild(c3);
    tr.appendChild(el("td","errdet",errDetail(e))); t.appendChild(tr); }
  es.b.appendChild(t);
  es.b.appendChild(el("div","note","Status-level provenance only — exit codes, refusal reasons, claim problem ids. govd never receives command output (the value-free boundary). Click a row to open its run."));
  main.appendChild(es.s);
}

const TABS=["Run","Ledger","Script","Flow"];

function detailView(main){
  const d=state.detail;
  if(!d){ main.appendChild(el("div","empty","loading run… (or it aged out of memory — check the mounted ledger on disk)")); return; }
  // fixed header — identity + decision + the run meta, shown above every tab
  const hd=sect(d.skill+" / "+d.perk); const hdEl=hd.s.querySelector(".hd");
  hdEl.appendChild(document.createTextNode("  ")); hdEl.appendChild(badge(d.decision));
  if(d.destructive) hdEl.appendChild(el("span","tag-dest"," destructive"));
  if(d.restored) hdEl.appendChild(el("span","tag-restored"," restored"));
  const m=el("div","meta");
  const row=(k,v)=>{ m.appendChild(el("span","k",k)); m.appendChild(el("span",null,v)); };
  row("run_id", d.run_id); row("time", fmt(d.ts)); row("plan_sha", (d.plan_sha||"").slice(0,24));
  row("tlc", d.tlc||"-"); if(d.approved&&d.approved.length) row("approved", d.approved.join(", "));
  hd.b.appendChild(m);
  if(d.var_keys&&d.var_keys.length){ const k=el("div","keys"); k.style.marginTop="8px"; for(const x of d.var_keys) k.appendChild(el("span",null,x)); hd.b.appendChild(k); }
  main.appendChild(hd.s);

  // tab bar
  if(!TABS.includes(state.tab)) state.tab="Run";
  const bar=el("div","tabs");
  for(const t of TABS){ const b=el("div","tab"+(state.tab===t?" on":""),t); b.onclick=()=>{ state.tab=t; render(); }; bar.appendChild(b); }
  main.appendChild(bar);

  const panel=el("div");
  ({Run:runTab, Ledger:ledgerTab, Script:scriptTab, Flow:flowTab}[state.tab]||runTab)(panel, d);
  main.appendChild(panel);
}

function runTab(panel, d){
  // Per-step log view: group every recorded event under the step it belongs to, so each step shows its
  // own log (grant → result/refusal). These are the value-free provenance lines govd holds — status, exit,
  // plan hash, refusal reason/diff — NEVER command output (the value-free boundary, govd.py step_result).
  const seq=d.seq||[], events=d.events||[];
  const ss=sect("Steps & logs");
  if(!seq.length && !events.length){ ss.b.appendChild(el("div","empty","no steps recorded for this run")); panel.appendChild(ss.s); return; }
  const byStep={};
  for(const e of events){ const k=e.step!=null?String(e.step):"?"; (byStep[k]=byStep[k]||[]).push(e); }
  const detail=e=>{
    if(e.type==="granted") return "plan "+String(e.plan_sha||"").slice(0,12);
    if(e.type==="step_result") return (e.status||"")+" (exit "+e.exit+")";
    if(e.type==="step_refused"){ let t=e.reason||""; if(e.diff_lines!=null) t+=" · "+e.diff_lines+" diff lines"; return t; }
    return "";
  };
  const block=(n,tool,st,evs)=>{
    const blk=el("div","stepblk"), head=el("div","stephd");
    head.appendChild(el("span","pill "+(st||"pending"), (n!=null?n+"·":"")+(tool||"?")));
    if(st) head.appendChild(el("span","sstate "+st, st));
    blk.appendChild(head);
    const tl=el("div","tl"); evs=(evs||[]).slice().sort((a,b)=>String(a.ts).localeCompare(String(b.ts)));
    for(const e of evs){ const row=el("div"); row.appendChild(el("span","t",fmt(e.ts)));
      row.appendChild(el("span","ev ev-"+e.type,e.type)); row.appendChild(el("span",null,detail(e))); tl.appendChild(row); }
    if(!evs.length) tl.appendChild(el("div","note","awaiting grant / result"));
    blk.appendChild(tl); return blk;
  };
  const list=el("div","steps"), states=stepStates(seq, events), inSeq=new Set();
  for(const s of states){ inSeq.add(String(s.n)); list.appendChild(block(s.n, s.tool, s.state, byStep[String(s.n)])); }
  for(const k of Object.keys(byStep)){ if(!inSeq.has(k)) list.appendChild(block(k==="?"?null:k, null, null, byStep[k])); }
  ss.b.appendChild(list); panel.appendChild(ss.s);
}

function flowTab(panel, d){
  const fl=sect("Task blueprint — "+d.skill+" / "+d.perk); const wrap=el("div","flow");
  fl.b.appendChild(el("div","note","Value-free by design: var keys render as ${KEY} and the run dir as $RUN — govd never receives the values (the SHELL//BLESS boundary). The actual values live agent-side, in your task-ledger.json + the run's record_store; they are never sent here."));
  const cached=flowCache[d.run_id];                          // keyed by RUN — this is the task-specific blueprint
  if(cached===undefined){                                    // fetch THIS run's task blueprint once, then cache
    wrap.appendChild(el("div","empty","loading task blueprint…"));
    fetch("/flow/run/"+enc(d.run_id)+"?token="+enc(token)).then(r=>r.ok?r.text():Promise.reject()).then(t=>{flowCache[d.run_id]=t; render();}).catch(()=>{flowCache[d.run_id]=""; render();});
  } else if(cached){ wrap.innerHTML=cached; }                // inline SVG — value-free (var KEYS as ${KEY}, run dir $RUN)
  else { wrap.appendChild(el("div","empty","no task blueprint for this run")); }
  fl.b.appendChild(wrap);
  const steps=stepStates(d.seq, d.events);                   // overlay where THIS run actually went, step by step
  if(steps.length){ const p=el("div","pills"); p.style.marginTop="10px"; for(const st of steps) p.appendChild(el("span","pill "+st.state, st.n+"·"+st.tool)); fl.b.appendChild(p); }
  panel.appendChild(fl.s);
}

function ledgerTab(panel, d){
  // the value-free claim the agent submitted to govd for THIS run. Only var KEYS cross the wire — the
  // values and record_store stay agent-side; govd governs the claim, never the data.
  const sub={skill:d.skill, perk:d.perk, var_keys:d.var_keys||[]};
  if(d.approved && d.approved.length) sub.approve=d.approved;
  const ls=sect("Submitted ledger — the value-free claim");
  ls.s.appendChild(el("pre",null,JSON.stringify(sub,null,2)));
  ls.b.appendChild(el("div","note","Decision: "+(d.decision||"?")+". Only var KEYS cross the wire — values + record_store stay agent-side (govd governs the claim, never the data). A secret is passed as a *_FILE pointer, read at runtime."));
  panel.appendChild(ls.s);
  if(d.problems && d.problems.length){
    const ps=sect("Problems — why govd "+(d.decision==="reject"?"rejected":"pushed back")); const box=el("div");
    for(const p of d.problems){ const id=(p&&p.id)||p;
      const det=p&&p.detail?(" — "+(Array.isArray(p.detail)?p.detail.join(", "):p.detail)):"";
      const reason=p&&p.reason?(" · "+p.reason):"";
      box.appendChild(el("div","prob",String(id)+det+reason)); }
    ps.b.appendChild(box); panel.appendChild(ps.s);
  }
}

function scriptTab(panel, d){
  // the script this call runs: the value-free compiled wrapper (gated steps + contract checks, ${VAR}
  // placeholders) plus the blessed porter source for each step, read from govd's own registry.
  let any=false;
  if(d.wrapper){ any=true;
    const pl=sect("Compiled wrapper (value-free) — what the executor drives");
    const shas=el("div","keys"); for(const [t,h] of Object.entries(d.snippet_shas||{})) shas.appendChild(el("span",null,t+" "+String(h).slice(0,10)));
    if(Object.keys(d.snippet_shas||{}).length) pl.b.appendChild(shas);
    pl.s.appendChild(el("pre",null,d.wrapper)); panel.appendChild(pl.s); }
  for(const [name,code] of Object.entries(d.sources||{})){ any=true;
    const sc=sect("porter · "+name); sc.s.appendChild(el("pre",null,code)); panel.appendChild(sc.s); }
  if(d.tlc_tla){ any=true; const a=sect("TLA+ spec (task.tla)"); a.s.appendChild(el("pre",null,d.tlc_tla)); panel.appendChild(a.s); }
  if(d.tlc_log){ any=true; const b=sect("TLC model check — "+(d.tlc||"")); b.s.appendChild(el("pre",null,d.tlc_log)); panel.appendChild(b.s); }
  if(!any) panel.appendChild(el("div","empty","no script — rejected before a plan was built, or a non-allow run restored after restart (only allowed runs persist their plan)"));
}

// P5-T02: one-shot fetch validates the token + draws the first frame, then the live feed is PUSHED over a
// single Server-Sent-Events connection (replacing the old 1.5s poll). Page 1 of decisions is live; older
// pages are a paused one-off fetch.
let es=null, decPage=1;
async function tick(){
  if(!token){ askToken(); return; }
  try{
    const r=await fetch("/monitor/state?token="+enc(token),{cache:"no-store"});
    if(r.status===403){ dot.className="dot err"; sessionStorage.removeItem("govd_monitor_token"); token=""; askToken(); return; }
    state.snap=await r.json(); decPage=1;
    dot.className="dot live"; stamp.textContent="updated "+fmt(state.snap.now)+" · "+LOCAL_TZ;
    render(); if(state.selected) refreshDetail();
    connectStream();
  }catch(e){ dot.className="dot err"; stamp.textContent="disconnected — retrying"; setTimeout(tick, 2000); }
}
function connectStream(){
  if(es) es.close();
  es=new EventSource("/monitor/stream?token="+enc(token));
  es.onmessage=(ev)=>{ if(decPage!==1) return;                 // browsing an older page — don't clobber the paused view
    try{ state.snap=JSON.parse(ev.data);
      dot.className="dot live"; stamp.textContent="live "+fmt(state.snap.now)+" · "+LOCAL_TZ;
      if(viewSig()!==lastSig) render();
      if(state.selected) refreshDetail();
    }catch(e){} };
  es.onerror=()=>{ dot.className="dot err"; stamp.textContent="reconnecting…"; };   // EventSource auto-reconnects (retry: 2000)
}
async function gotoDecPage(n){
  decPage=Math.max(1,n);
  if(decPage===1){ tick(); return; }                            // back to the live (page 1) feed
  try{
    const r=await fetch("/monitor/state?token="+enc(token)+"&dec_page="+decPage,{cache:"no-store"});
    if(r.status===403){ token=""; sessionStorage.removeItem("govd_monitor_token"); askToken(); return; }
    state.snap=await r.json();
    decPage=(state.snap.decisions_page||{}).page||decPage;   // track the server-clamped page (label/targets stay in sync)
    dot.className="dot"; stamp.textContent="browsing decisions · page "+decPage; render();
  }catch(e){ dot.className="dot err"; }
}
tick();
</script>
