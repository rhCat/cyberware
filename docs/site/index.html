<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cyberware — skill dashboard</title>
<style>
  :root { --bg:#0e1016; --panel:#161a23; --panel2:#1c212d; --line:#262c3a; --ink:#e7e9ef; --dim:#8a92a6;
          --acc:#d6b656; --green:#82b366; --red:#c0504d; --blue:#6c8ebf; --mono:ui-monospace,Menlo,Consolas,monospace; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.55 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:14px 26px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:18px; letter-spacing:.4px; }
  header .sub { color:var(--acc); font-size:12px; border:1px solid var(--acc); border-radius:10px; padding:2px 9px; }
  header .topnav { display:flex; gap:3px; margin-left:8px; }
  header .nav { padding:6px 13px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--dim); }
  header .nav:hover { background:var(--panel); color:var(--ink); }
  header .nav.active { background:var(--panel2); color:var(--acc); outline:1px solid var(--line); }
  header .stats { color:var(--dim); font-size:12px; margin-left:auto; }
  .layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 56px); }
  aside { border-right:1px solid var(--line); padding:14px 10px; overflow:auto; }
  aside .grp { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--acc); padding:16px 12px 5px; font-weight:600; }
  aside .grp:first-child { padding-top:4px; }
  aside .item { padding:9px 12px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px; }
  aside .item:hover { background:var(--panel); }
  aside .item.active { background:var(--panel2); outline:1px solid var(--line); }
  aside .item b { font-weight:600; }
  aside .item .n { color:var(--dim); font-size:11px; margin-left:auto; }
  aside .item .dot { width:7px; height:7px; border-radius:50%; background:var(--blue); flex:none; }
  main { padding:22px 28px; overflow:auto; }
  h2 { font-size:16px; margin:0 0 4px; }
  h3 { font-size:12px; color:var(--acc); text-transform:uppercase; letter-spacing:1px; margin:26px 0 10px; }
  .desc { color:var(--dim); max-width:820px; margin:0 0 8px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; min-width:0; }
  #bp { overflow:auto; max-height:680px; }
  #bp svg, .card svg { max-width:100%; height:auto; background:#0a0f0a; border:1px solid #143a14; border-radius:6px; }
  .inv { display:flex; gap:8px; padding:6px 0; border-bottom:1px dashed var(--line); }
  .inv b { color:var(--green); font-family:var(--mono); font-size:12px; white-space:nowrap; }
  .inv span { color:var(--dim); font-size:13px; }
  .tabs { display:flex; gap:2px; flex-wrap:wrap; border-bottom:1px solid var(--line); margin:16px 0 2px; }
  .tab { padding:8px 15px; cursor:pointer; font-size:13px; color:var(--dim); border-bottom:2px solid transparent; font-family:var(--mono); }
  .tab:hover { color:var(--ink); }
  .tab.active { color:var(--acc); border-bottom-color:var(--acc); }
  .tab.ov { font-family:inherit; }
  .perkhead { display:flex; align-items:center; gap:10px; margin:18px 0 2px; }
  .perkhead b { font-size:17px; } .perkhead .sum { color:var(--dim); font-size:13px; }
  details.bp > summary { cursor:pointer; color:var(--blue); font-size:12px; margin:14px 0 6px; }
  .badge { font-size:10px; padding:2px 7px; border-radius:6px; margin-left:auto; }
  .badge.ro { background:#23402a; color:#a9d6b3; } .badge.dx { background:#43221f; color:#e6a9a4; }
  .flow { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:10px 0; }
  .flow .step { background:var(--panel2); border:1px solid var(--line); border-radius:7px; padding:5px 11px; font-family:var(--mono); font-size:12px; }
  .flow .arr { color:var(--dim); }
  .kv { color:var(--dim); font-size:13px; margin:2px 0; }
  ul.rules { margin:6px 0; padding-left:18px; color:var(--dim); font-size:13px; }
  table.io { border-collapse:collapse; font-size:12.5px; margin:6px 0; }
  table.io td, table.io th { border:1px solid var(--line); padding:4px 9px; text-align:left; }
  table.io th { color:var(--dim); font-weight:600; }
  table.io .req { color:var(--acc); }
  code { background:#0b0d13; border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:#cdd3e1; font-family:var(--mono); }
  details.code { margin:8px 0; }
  details.code > summary { cursor:pointer; color:var(--blue); font-size:12px; font-family:var(--mono); }
  pre { background:#0b0d13; border:1px solid var(--line); border-radius:8px; padding:12px; overflow:auto; font:12px/1.5 var(--mono); color:#cdd3e1; margin:6px 0; }
  pre.tall { max-height:360px; }
  .md h1,.md h2,.md h3,.md h4 { color:var(--ink); }
  .md h4 { margin:12px 0 4px; font-size:14px; }
  .md p, .md li { color:var(--dim); }
  .md blockquote { border-left:3px solid var(--line); margin:8px 0; padding:2px 12px; color:var(--dim); }
  .muted { color:var(--dim); }
  /* demo task flow */
  .lbl { font-size:12px; color:var(--acc); margin:16px 0 6px; font-weight:600; }
  .lbl .muted { font-weight:400; }
  .demo-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(330px, 1fr)); gap:8px 20px; align-items:start; }
  .stages { display:flex; flex-direction:column; gap:5px; }
  .stage { display:flex; gap:10px; align-items:flex-start; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 12px; }
  .stage .sn { background:var(--panel2); color:var(--acc); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:11px; flex:none; font-family:var(--mono); margin-top:1px; }
  .stage b { font-family:var(--mono); font-size:12.5px; color:var(--ink); }
  .stage em { display:block; color:var(--dim); font-size:12px; font-style:normal; }
  .subnav { display:flex; gap:6px; flex-wrap:wrap; margin:14px 0 18px; }
  .subtab { padding:5px 12px; border-radius:7px; cursor:pointer; font-size:12px; color:var(--dim); background:var(--panel); border:1px solid var(--line); font-family:var(--mono); }
  .subtab:hover { color:var(--ink); }
  .subtab.active { color:#0e1016; background:var(--acc); border-color:var(--acc); font-weight:600; }
  /* document view */
  .docview { padding:30px 28px; overflow:auto; }
  .doc { max-width:860px; margin:0 auto; }
  .doc.md h1 { font-size:25px; margin:0 0 14px; }
  .doc.md h2 { font-size:18px; margin:28px 0 8px; border-bottom:1px solid var(--line); padding-bottom:6px; }
  .doc.md h3 { font-size:14px; margin:18px 0 6px; color:var(--acc); text-transform:none; letter-spacing:0; }
  .doc.md h4 { font-size:13px; margin:14px 0 4px; color:var(--acc); }
  .doc.md p, .doc.md li { color:#c2c8d6; }
  .doc.md a { color:var(--blue); }
  .doc.md table.mdt { border-collapse:collapse; font-size:13px; margin:12px 0; width:100%; }
  .doc.md table.mdt th, .doc.md table.mdt td { border:1px solid var(--line); padding:6px 11px; text-align:left; vertical-align:top; }
  .doc.md table.mdt th { color:var(--dim); background:var(--panel); }
  .doc.md blockquote { border-left:3px solid var(--acc); margin:10px 0; padding:4px 14px; color:var(--dim); }
  .doc.md pre { background:#0b0d13; }
</style>
</head>
<body>
<header>
  <h1>⚙︎ cyberware</h1><span class="sub">skill dashboard</span>
  <nav class="topnav" id="topnav"></nav>
  <span class="stats" id="stats"></span>
</header>
<div class="layout" id="dash">
  <aside id="list"></aside>
  <main id="detail"></main>
</div>
<div class="docview" id="docview" style="display:none"></div>

<script>
let S = [], DOCS = [];
const esc = (t) => String(t==null?"":t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const STAGES = [
  ["validator", "confirms the inputs are real — record_store writable, the required binaries reachable, required vars present"],
  ["composer", "compiles the L++ blueprint → TLC: no logical deadlock"],
  ["compiler", "the task config + the perk's snippets → the bash below; each tool a gated step + its contract check"],
  ["oversight", "scans the bash against OVERSIGHT_RULE — destructive/dangerous patterns push back unless explicitly --approve'd"],
  ["executor", "THE governed run — .bk tamper-check, upstream-step gate, records each step's result to run-ledger.json"],
];

// ── markdown: fenced code, tables, links, headings, lists, blockquote, bold, inline code ──
function md(src) {
  src = src.replace(/^---[\s\S]*?---\s*/, "");
  const L = src.split("\n"), out = []; let i = 0;
  const inline = (t) => esc(t)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const cells = (l) => l.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map(c => c.trim());
  while (i < L.length) {
    const line = L[i];
    if (line.startsWith("```")) { const c = []; i++; while (i < L.length && !L[i].startsWith("```")) c.push(L[i++]); i++; out.push(`<pre>${esc(c.join("\n"))}</pre>`); continue; }
    if (line.includes("|") && i+1 < L.length && /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(L[i+1])) {
      const head = cells(line); i += 2; const rows = [];
      while (i < L.length && L[i].includes("|")) rows.push(cells(L[i++]));
      out.push(`<table class="mdt"><thead><tr>${head.map(c=>`<th>${inline(c)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${inline(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>`); continue;
    }
    let m;
    if ((m = line.match(/^(#{1,6})\s+(.*)/))) { const n = m[1].length; out.push(`<h${n}>${inline(m[2])}</h${n}>`); i++; continue; }
    if (/^[-*]\s+/.test(line)) {
      const items = [];
      while (i < L.length && /^[-*]\s+/.test(L[i])) { let it = L[i++].replace(/^[-*]\s+/, ""); while (i < L.length && /^\s+\S/.test(L[i])) it += " " + L[i++].trim(); items.push(`<li>${inline(it)}</li>`); }
      out.push(`<ul>${items.join("")}</ul>`); continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      const items = [];
      while (i < L.length && /^\d+\.\s+/.test(L[i])) { let it = L[i++].replace(/^\d+\.\s+/, ""); while (i < L.length && /^\s+\S/.test(L[i])) it += " " + L[i++].trim(); items.push(`<li>${inline(it)}</li>`); }
      out.push(`<ol>${items.join("")}</ol>`); continue;
    }
    if ((m = line.match(/^>\s?(.*)/))) { out.push(`<blockquote>${inline(m[1])}</blockquote>`); i++; continue; }
    if (line.trim() === "") { i++; continue; }
    out.push(`<p>${inline(line)}</p>`); i++;
  }
  return out.join("\n");
}

// ── top nav: Dashboard + the review docs ──
let mode = "dashboard", cur = { i: 0, tab: "overview" };
const dash = document.getElementById("dash"), docview = document.getElementById("docview");

function renderNav() {
  const nav = [["dashboard", "Dashboard"], ...DOCS.map(d => [d.id, d.label])];
  document.getElementById("topnav").innerHTML = nav.map(([id, label]) =>
    `<span class="nav ${id===mode?'active':''}" data-id="${esc(id)}">${esc(label)}</span>`).join("");
  document.querySelectorAll("#topnav .nav").forEach(el => el.onclick = () => setMode(el.dataset.id));
}

function setMode(id) {
  mode = id; renderNav();
  if (id === "dashboard") { dash.style.display = "grid"; docview.style.display = "none"; render(); return; }
  dash.style.display = "none"; docview.style.display = "block";
  const d = DOCS.find(x => x.id === id);
  let pre = "";
  if (d && d.pipeline) {
    pre = `<h2>The pipeline as a blueprint <span class="muted" style="font-size:13px">· the ouroboros</span></h2>
      <p class="muted" style="font-size:12.5px">The infra's <b>own</b> L++ blueprint — every task-ledger's path through the governed runtime (validate → compose → compile → oversee → execute), drawn with the same visualizer the skills use. Each gate's <b>✗ fail</b> route is the stage refusing and logging.</p>
      <div class="card" id="bp">${d.pipeline.svg}</div>
      <details class="bp" style="margin:10px 0 24px"><summary>pipeline blueprint — L++ source (infra/pipeline.blueprint.json)</summary><pre class="tall">${esc(JSON.stringify(d.pipeline.blueprint, null, 2))}</pre></details>`;
  }
  docview.innerHTML = `<div class="doc md">${pre}${md(d ? d.body : "")}</div>`;
  window.scrollTo(0, 0);
}

// ── dashboard ──
function renderList() {
  document.getElementById("stats").textContent =
    `${S.length} skills · ${S.reduce((a,s)=>a+s.perks.length,0)} perks · ${new Set(S.flatMap(s=>s.perks.flatMap(p=>p.sequence))).size} tools`;
  const groups = {};
  S.forEach((s, i) => { const g = s.group || "skills"; (groups[g] = groups[g] || []).push(i); });
  const order = ["skills", "cws internals"];
  const keys = order.filter(g => groups[g]).concat(Object.keys(groups).filter(g => !order.includes(g)));
  document.getElementById("list").innerHTML = keys.map(g =>
    `<div class="grp">${esc(g)}</div>` + groups[g].map(i =>
      `<div class="item" data-i="${i}"><span class="dot"></span><b>${esc(S[i].id)}</b><span class="n">${S[i].perks.length}</span></div>`).join("")).join("");
  document.querySelectorAll("#list .item").forEach(el => el.onclick = () => openSkill(+el.dataset.i));
}

function openSkill(i) { cur = { i, tab: "overview", bp: "shared" }; setMode("dashboard"); }
function setTab(t) { cur.tab = t; render(); }

function render() {
  const s = S[cur.i];
  document.querySelectorAll("#list .item").forEach(el => el.classList.toggle("active", +el.dataset.i === cur.i));
  const tabs = `<span class="tab ov ${cur.tab==='overview'?'active':''}" data-tab="overview">Overview</span>` +
    `<span class="tab ov ${cur.tab==='blueprint'?'active':''}" data-tab="blueprint">Blueprints</span>` +
    s.perks.map(p=>`<span class="tab ${p.id===cur.tab?'active':''}" data-tab="${esc(p.id)}"><span class="muted" style="font-weight:400">perk ·</span> ${esc(p.id)}</span>`).join("");
  const body = cur.tab==="overview" ? overviewHtml(s)
    : cur.tab==="blueprint" ? blueprintHtml(s)
    : perkPanel(s.perks.find(p=>p.id===cur.tab));
  document.getElementById("detail").innerHTML = `
    <h2>${esc(s.name)} <span class="muted" style="font-size:13px">· ${esc(s.id)}</span></h2>
    <p class="desc">${esc(s.description)}</p>
    <div class="tabs">${tabs}</div>
    <div class="tabc">${body}</div>`;
  document.querySelectorAll(".tab").forEach(el => el.onclick = () => setTab(el.dataset.tab));
  document.querySelectorAll(".subtab").forEach(el => el.onclick = () => { cur.bp = el.dataset.bp; render(); });
}

function overviewHtml(s) {
  return `
    <p class="muted" style="font-size:12.5px">The <b>Blueprints</b> tab shows the lifecycle and a worked task flow per perk; each <b>perk</b> tab shows its flow, contract, and code.</p>
    <h3>Guardrails — safety_invariants</h3>
    <div class="card">${((s.blueprint||{}).safety_invariants||[]).map(inv =>
      `<div class="inv"><b>${esc(inv.name)}</b><span>${esc((inv.description||"").replace(/^GUARDRAIL:\s*/,""))}</span></div>`).join("") || '<span class="muted">none</span>'}</div>
    <h3>Context — SKILL.md</h3>
    <div class="card md">${md(s.skill_md || "")}</div>`;
}

function blueprintHtml(s) {
  const sub = (cur.bp === "shared" || s.perks.some(p => p.id === cur.bp)) ? cur.bp : "shared";
  const subnav = `<span class="subtab ${sub==='shared'?'active':''}" data-bp="shared">shared blueprint</span>` +
    s.perks.map(p => `<span class="subtab ${sub===p.id?'active':''}" data-bp="${esc(p.id)}">demo: ${esc(p.id)}</span>`).join("");
  let body;
  if (sub === "shared") {
    const stages = STAGES.map(([n, desc], i) =>
      `<div class="stage"><span class="sn">${i+1}</span><div><b>${n}</b><em>${esc(desc)}</em></div></div>`).join("");
    body = `
      <h3>Shared lifecycle</h3>
      <div class="card" id="bp">${s.svg || '<span class="muted">no diagram</span>'}</div>
      <p class="muted" style="font-size:12.5px;margin-top:8px">Every skill runs this lifecycle. A task flows through the governed pipeline — pick a <b>demo</b> above to see a concrete one, config to compiled script:</p>
      <div class="stages">${stages}</div>
      <div class="lbl">blueprint — L++ source <span class="muted">— blueprint.json</span></div>
      <pre class="tall">${esc(JSON.stringify(s.blueprint || {}, null, 2))}</pre>`;
  } else {
    const p = s.perks.find(x => x.id === sub), d = p.demo || {};
    body = `
      <div class="perkhead"><b>demo · ${esc(p.id)}</b><span class="sum">${esc(p.summary)}</span>
        <span class="badge ${p.destructive?'dx':'ro'}">${p.destructive?'destructive':'read-only'}</span></div>
      <p class="muted" style="font-size:12.5px">The intelligence fills the <b>task config</b>; it compiles to the <b>script</b> the executor runs — its shape visualized in <b>this task's blueprint</b>: the lifecycle carrying this task's actual settings (perk · vars · run dir), saved to the run dir as <code>task-blueprint.json</code> and the source the run diagrams compile from.</p>
      <div class="lbl">task config <span class="muted">— task-ledger.json</span></div>
      <pre>${esc(JSON.stringify(d.ledger || {}, null, 2))}</pre>
      <div class="lbl">task blueprint <span class="muted">— the lifecycle specialized with this task's settings (header) + perk tools</span></div>
      <div class="card" id="bp">${p.svg || ""}</div>
      <div class="lbl">task blueprint — L++ source <span class="muted">— task-blueprint.json; the <code>task</code> field carries the perk, vars, tools + run dir</span></div>
      <pre class="tall">${esc(JSON.stringify(d.blueprint || s.blueprint || {}, null, 2))}</pre>
      <div class="lbl">compiled script <span class="muted">— what the executor runs, step by step</span></div>
      <pre>${esc(d.compiled || "")}</pre>`;
  }
  return `<div class="subnav">${subnav}</div>${body}`;
}

function perkPanel(p) {
  const meta = p.metadata || {}, c = p.contracts || {};
  const inputs = Object.entries(c.inputs || {}).map(([k,v]) =>
    `<tr><td class="${v.required?'req':''}">${esc(k)}${v.required?' *':''}</td><td>${esc(v.type||'')}</td></tr>`).join("");
  const outputs = Object.entries(c.outputs || {}).map(([k,v]) =>
    `<tr><td>${esc(k)}</td><td><code>${esc(v.path||'')}</code></td></tr>`).join("");
  const snippets = Object.entries(p.snippets || {}).map(([name,code]) =>
    `<details class="code"><summary>${esc(name)}</summary><pre>${esc(code)}</pre></details>`).join("");
  return `
    <div class="perkhead"><b>${esc(p.id)}</b><span class="sum">${esc(p.summary)}</span>
      <span class="badge ${p.destructive?'dx':'ro'}">${p.destructive?'destructive':'read-only'}</span></div>
    <div class="flow">${p.sequence.map(t=>`<span class="step">${esc(t)}</span>`).join('<span class="arr">→</span>')}</div>
    <h3>Spec</h3>
    <div class="card">
      ${meta.usage ? `<div class="kv"><b>usage</b> — ${esc(meta.usage)}</div>` : ""}
      ${meta.limitation ? `<div class="kv"><b>limitation</b> — ${esc(meta.limitation)}</div>` : ""}
      ${(meta.rules&&meta.rules.length) ? `<ul class="rules">${meta.rules.map(r=>`<li>${esc(r)}</li>`).join("")}</ul>` : ""}
      <div class="kv"><b>requires</b> — ${(p.requires||[]).map(r=>`<code>${esc(r)}</code>`).join(" ") || "—"}</div>
      ${inputs ? `<table class="io"><tr><th>input</th><th>type</th></tr>${inputs}</table>` : ""}
      ${outputs ? `<table class="io"><tr><th>output</th><th>path</th></tr>${outputs}</table>` : ""}
      ${c.checks ? `<div class="kv"><b>checks</b> — ${esc(JSON.stringify(c.checks))}</div>` : ""}
    </div>
    <h3>Code</h3>
    <div class="card">${snippets || '<span class="muted">no snippet</span>'}</div>
    <details class="bp"><summary>lifecycle — blueprint annotated with this perk's steps</summary>
      <div class="card" id="bp">${p.svg || ''}</div></details>`;
}

function boot() {
  S = window.SKILLS || []; DOCS = window.DOCS || [];
  renderNav(); renderList(); if (S.length) openSkill(0);
}
// load the data with a version query so a deploy is never served stale from cache
(function () {
  const el = document.createElement("script");
  el.src = "data.js?v=" + Date.now();
  el.onload = boot;
  el.onerror = () => { document.getElementById("detail").innerHTML = '<p class="muted">failed to load data.js</p>'; };
  document.head.appendChild(el);
})();
</script>
</body>
</html>
