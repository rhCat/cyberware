chip, each skill placed by namespace; exact ns:name dup -> HARD ERROR; temp-dir build + atomic swap; re-pins the v2 manifest","flow_role":"multi-chip compose — step 1 of compose->verify->serve","public":true},{"module":"infra/tool (tool)","name":"plan","file":"infra/tool/compose.py","line":77,"signature":"plan(sources) -> (placements, conflicts)","intent":"Resolve every source skill to its composed id + DETECT exact-dup conflicts (FS-fold keyed) BEFORE any write","flow_role":"compose conflict detection (fail-closed, pre-write)","public":true},{"module":"infra/govern","name":"access_allows","file":"infra/govern/skillacl.py","line":53,"signature":"access_allows(access, *, mode, is_local_dev=False, principal=None, principal_tier=None, perk=None, enforce_default_closed=False) -> (ok, problem|None)","intent":"ACCESS-1: the skill-intrinsic access.json gate — local-open / remote-closed (behind skillacl_enforce); declared policy always enforced; fail-closed","flow_role":"gate 2 of 3 (VALIDATE / ACCESS-1 / ACCESS-2), in govern() + step_reauthorize","public":true},{"module":"infra/govern","name":"load_access","file":"infra/govern/skillacl.py","line":33,"signature":"load_access(skill, chip=None) -> dict|None","intent":"The skill's access.json policy, or None when absent (the flag-governed default); malformed -> CLOSED sentinel","flow_role":"ACCESS-1 policy load","public":true},{"module":"infra/govern","name":"access_policy_sha","file":"infra/govern/skillacl.py","line":76,"signature":"access_policy_sha(access) -> str","intent":"Stable sha of the effective access policy; recorded as skillacl_sha (behind skillacl_fold) for exod's off-node re-check (Step 7)","flow_role":"ACCESS-1 provenance fold","public":true},{"module":"infra/govern","name":"step_reauthorize","file":"infra/govern/govd.py","line":602,"signature":"step_reauthorize(cfg, rec0, *, now=None) -> (ok, reason|None)","intent":"Re-bind authority on an IN-FLIGHT step to the live registry + skill policy: re-run ACCESS-2 (needs the registry) AND ACCESS-1 (skill-intrinsic, registry-independent)","flow_role":"step-time re-governance — binds revocation / tightened policy mid-run","public":true},{"module":"infra/govern","name":"_skill_listed","file":"infra/govern/principals.py","line":103,"signature":"_skill_listed(skill, skills) -> bool","intent":"ACCESS-2 skill match: exact ns:name, the per-namespace ns:* wildcard, OR a legacy bare leaf (pre-cutover back-compat)","flow_role":"per-actor ACL skill match","public":false},{"module":"infra/govern","name":"_fleet_rank","file":"infra/govern/fleetd.py","line":228,"signature":"_fleet_rank(ft) -> int | None","intent":"Rank a node's fleet_tier on the topology HIERARCHY (mothership=1 > edge=2 > subagent=3 > … — lower rank = higher authority; bare positive ints allowed beyond subagent). ORTHOGONAL to the trust tier; unknown/absent -> None (an unranked node is never elevated).","flow_role":"fleet-tier hierarchy"},{"module":"infra/govern","name":"_fleet_tier_ok","file":"infra/govern/fleetd.py","line":244,"signature":"_fleet_tier_ok(node_ft, want) -> bool","intent":"Exact fleet-tier discovery filter for /fleet/find?fleet_tier=: an absent/unparseable `want` imposes no constraint; otherwise the node must sit at EXACTLY that tier (compared by rank). An unranked node never satisfies a constrained query.","flow_role":"fleet discovery"},{"module":"infra/tool","name":"_node_groups","file":"infra/tool/fleetdash.py","line":507,"signature":"_node_groups(results) -> list[(fleet_tier, [node, ...])]","intent":"Group fleet-dashboard nodes by fleet_tier in hierarchy order (mothership -> edge -> subagent -> deeper -> untiered last) for the side-nav.","flow_role":"fleet dashboard"},{"module":"infra/tool","name":"_sidebar","file":"infra/tool/fleetdash.py","line":520,"signature":"_sidebar(results) -> str","intent":"Render the hierarchical, searchable node side-nav: a filter box + nodes grouped under collapsible fleet-tier headers with up/down/stale status dots and run counts. Client-side search + per-tier collapse persist in localStorage ('cw-nav') across the 5s refresh.","flow_role":"fleet dashboard"}],"documents":[{"doc":"SKILL.md","intent":"The agent contract: how an agent runs a real task through cyberware's governed channel by emitting only a claim and running the value-free plan govd blesses — never authoring or running commands itself.","concepts":["the five-step loop (load skill -> discover -> emit claim -> govd governs/agent runs blessed plan -> read verdict)","no-data/no-code-crosses-the-boundary principle (govd sees only claim names + var KEYS + status)","GOVD_URL + ./govd-client; discovery via --discover / GET /catalog","per-copy skill status table: verified / drift / unverified / server_drift","the claim/task-ledger JSON (skill, perk, record_store, vars) as the agent's only output","var KEYS sent not values; secrets as *_FILE pointers (chmod 600, cat at runtime); plaintext-secret keys refused","govd decisions: allow (value-free plan = tool seq + per-snippet sha256 + ${VAR} wrapper + per-run WebSocket), push_back (destructive perk needs --approve), reject (bad key, plaintext secret, missing input, drift, deadlock, ACL-scope denial)","cooperative mode (default, agent runs porters+cores from own registry, status-only over WS) vs delegated mode (--delegated: exod runs each step confined, Ed25519-signs authoritative status; agent self-report rejected)","per-actor ACL on a principal: operator-signed --attestation + one-time possession --proof-key re-checked off-node by exod in enforce mode (--acl-strict, pinned ACL-issuer key); audits rather than refuses without it","blessed run.sh immutability: tamper snapshot refuses on drift, WS gate refuses any step whose plan_sha or upstream order mismatches","verdict shape {decision, plan_sha, results:[{step, exit}], ledger}; provenance at GET /ledger/<run_id>?token=","no-matching-skill path: cws-create/evaluate -> cws-create/scaffold, or cws-addperk (PR-reviewed, then verified after image rebuild)"],"references":["govd","govd-client (--url, --discover, --ledger, --fetch-only, --approve, --delegated, --token-file/GOVD_TOKEN_FILE, --attestation, --proof-key, --acl-strict)","exod","GET /catalog","GET /ledger/<run_id>","task-ledger.json / record_store / vars","skillChip/<skill>/SKILL.md","perks/<perk>/metadata.json","cws-create (evaluate, scaffold)","cws-addperk","plan_sha","Ed25519","porters + cores","docs/containment-delegation.md","cyberware.md","docs/governance-service.md"]},{"doc":"README.md","intent":"Top-level orientation to cyberware as a governance runtime for AI-agent execution: the value-free claim/bless model, two-phase setup (run the governor, run a task), the engine+cartridge split, the local pipeline, authoring/testing, and the agent economy.","concepts":["governance runtime thesis: governed (policy-checked before run) + verifiable (hash-pinned blessed step) + ledgered (tamper-evident provenance); guardrail is code, not a prompt; enables fleet/swarm scale","four-plane architecture (thinking / agent / cyberware control layer / execution substrate) with cyberware the sole gateway; value-free — data + secrets stay in the substrate","Setup phase 1: run the signed govd Docker image (ghcr.io/rhcat/cyberware:latest), persist ledger via -v cyberware-govd:/data/govd; verify with keyless cosign (GitHub OIDC)","the four-image catalog: cyberware (governance server, lean govd+TLC), cyberware-body (delegated mode, govd+exod non-root, bwrap/gVisor), cyberware-modelcheck (full prover, Apalache+TLAPS), cyberware-compute (CI compute)","Setup phase 2: two phases per run — govern (govd always blesses a value-free plan, any OS) vs run (cooperative = agent executes on own machine, any OS; delegated = exod executes sandboxed on a Linux node)","three independent axes: govd is a server you --url anywhere; the agent is whatever runs govd-client; only delegated phase-2 needs Linux (bwrap/gVisor sandbox)","operator-set exec_mode per node/principal (agent can't force delegated); delegated govd with no exod refuses; GET /health shows exec_mode + exod_attached","engine + cartridge split: engine reads chip from registry.SKILLCHIP ($CYBERWARE_SKILLCHIP or <repo>/skillChip); chip self-describing via index.json (skill_sha + chip_sha); boot validation; CLOUD_MODE=1 live clone of CLOUD_SOURCE@CLOUD_SOURCE_TAG (CLOUD_SOURCE_TOKEN, GIT_ASKPASS-only)","the skillChip layout (SKILL.md, perks.json, blueprint.json, ledger.json, index.json; perks/<perk>/ metadata.json, manifesto.json, src/contracts.json, src/<tool>, test/case.json)","the local govern flow stages: validator -> composer (L++ -> TLC, no abstract deadlock) -> compiler (one bash script, step-wise --run flags, +.drawio/.svg) -> oversight (OVERSIGHT_RULE) -> executor (.bk tamper-check, in-channel oversight scan, upstream-step check, run-ledger, EXECUTOR_RULE)","skill = blueprint (general L++ CFG behaviour, perks optional) + perks (predetermined contract-bound pathways with deterministic structured output)","the governance principle: executor.py is the chokepoint; ledger registration, .bk drift flag, in-channel OVERSIGHT scan with ledger-recorded --approve waivers, upstream-step gating, EXECUTOR_RULE limits","SV-3 kernel-enforced boundary: infra/exec/ signed capability grants, exod daemon (Ed25519 sig is only trusted status), bwrap SandboxProfile (unshared namespaces); refusals hold with in-process scan disabled; cws-redteam (>=12 attacks) + cws-bench","drift reporting taxonomy: unknown_skill_perk reject / unverified (discovery) / drift / server_drift; native dev loop (skill_index --check at boot, refuse on drift)","test suite under tests/: unit (runlog, oversight.scan, compiler, composer, scaffold, visualize), integration (executor channel + full pipeline), per-perk contract (159 perks across 41 skills), in-skill self-tests (test/case.json via infra.tool.skilltest, pinned in index.json, skip for non-hermetic); ~1,200 tests gated in CI","agent economy: skillChip as third product surface, the skill as metering point; a governed run priced (itemized quote) -> metered on exod-signed meter -> settled over a payment rail; lineage royalty to ancestors + platform tax","settlement mechanics: payout gated on plan-bound quote funded in escrow, settles at most once on dual-signed validation:pass receipt, exact-decimal amounts (float banned by AST lint), conservation-checked double-entry; rails = disputes (m-of-n WebAuthn with bond clawback), reputation, FMV index, prepaid credit tier, refund-on-fail metering, TSA-anchored completion receipt","static self-discovering homepage + dashboard (docs/site, pages.yml), local preview assembly recipe, authoring via scaffold + visualize"],"references":["govd","exod","executor.py","validator.py / composer.py / compiler.py / oversight.py (infra.govern.*)","infra.tool.scaffold / visualize / skill_index / skilltest","registry.SKILLCHIP / $CYBERWARE_SKILLCHIP / CYBERWARE_SKILLCHIP","ghcr.io/rhcat/cyberware, cyberware-body, cyberware-modelcheck, cyberware-compute","Dockerfile / Dockerfile.body / server-image.yml / body-image.yml / modelcheck-image.yml / compute-image.yml / pages.yml / codeqc.yml","CLOUD_MODE / CLOUD_SOURCE / CLOUD_SOURCE_TAG / CLOUD_SOURCE_TOKEN","GET /health (exec_mode, exod_attached)","GET /ledger/<run_id>","OVERSIGHT_RULE.json / EXECUTOR_RULE.json / govd_config.json / govd_dashboard.html","skillChip submodule (index.json, perks.json, blueprint.json, ledger.json, manifesto.json, contracts.json, test/case.json)","infra/exec/ (signed grants, bwrap SandboxProfile)","cws-create / cws-addperk / cws-redteam / cws-bench / ci-codeqc","L++ (lpp)","cosign keyless / GitHub OIDC","docs/architecture.md (#the-kernel-enforced-execution-boundary-sv-3), governance-service.md, authoring.md, governed-vs-free.md, settlement.md, skills.md, SPEC.md, cyberware.md"]},{"doc":"index.html","intent":"The public marketing homepage (cyberware.systems) — a ten-section cyberpunk-styled landing page presenting the 'free up to the gate, accountable past it' thesis and the engine's mechanisms with interactive/animated demos.","concepts":["hero thesis: 'the agent proposes, the engine governs, nothing executable crosses the wire'; free up to the gate / accountable past it; governance only at the moment of commitment (money, production, another system)","section 02 gate-not-wall: govern at the single point of commitment, leave imagination free; governance as enablement","section 03 value-free plan: agent sends a CLAIM (skill, perk, var KEYS only) -> govd checks own registry + model-checks + blesses a PLAN (tool seq + sha256 + ${VAR} wrapper); cooperative mode (any OS) vs delegated mode (exod, a confined OS principal, Ed25519-signs status); mode is operator's choice","section 03 per-token capability scope: allowed skills + tier ceiling + destructive/secret reach; out-of-scope claim denied at governor, not self-approvable; on a body a scoped grant rides an operator-signed attestation + one-time possession proof exod re-checks off-node","section 04 authenticity chain: sha256 content-addressing file -> skill_sha -> chip_sha; name-validated resolver + untracked-file gate; interactive 'flip one byte' drift demo (MATCH vs REFUSED-DRIFT)","section 05 contracts + model-checked blueprints: typed I/O contracts enforced at execution; blueprints proven deadlock-free by three provers (TLC, Apalache, TLAPS), animated prover lamps + deadlock-free stamp","section 06 the SV-1..SV-6 security ladder: SV-1 RFC-8785 canonical hashing, SV-2 hash-chained ledger (crypto-shred AES-256-GCM, Merkle checkpoint), SV-3 kernel boundary (bwrap non-root uid 65534 nobody, exod Ed25519, re-derived snippet/closure hashes, 9/10 with microVM/dev/kvm brick), SV-4 signed transparency-logged releases + revocation + mutual live-binary re-measurement, SV-5 three-prover model-checking, SV-6 settlement layer","section 06 SV-6 settlement detail: quote -> meter -> settle on exod-signed meter; payout impossible until plan-bound quote funded in escro nd exod (not govd) executes each step confined under bwrap/gVisor and Ed25519-signs the authoritative status","the cyberware-body unified non-root Linux container (ghcr.io/rhcat/cyberware-body, Dockerfile.body) bundling govd-delegated + exod","cooperative (run_governed) default vs opt-in delegated (run_delegated, --delegated, Linux-only) run modes","settlement plane refusing any meter whose by != exod, making a govd-executes path structurally un-settleable","dual-control: grant-issuer key (govd) distinct from executor identity key (exod), enforced at Exod.__init__","govd_executor.serve retired to a refusing stub for the delegated path but kept as the cooperative reference model","per-run workspace materialization (the blessed wrapper + perk src closure) and exod's own time-of-use re-hash of every staged file against the grant's signed snippet_shas pin via closureverify","closure integrity refusing unpinned siblings and empty-pin staged code (closure:unpinned), with a denylist discriminator (any staged non-contracts.json file refused)","single-use grant minting (tight TTL, nonce, snippet_shas, capabilities=['run'], credentials=authorized) with durable nonce-replay check","Store.claim_step / release_step atomic at-most-once reservation across the check→dial-exod→record window to prevent double-execute/double-bill, with step_delegation_refused recorded outside the done-set as retryable","vault-injected grant-authorized credentials (--setenv after --clearenv) resolved by exod's own FileVault/SopsAgeVault, never in govd's process env","GET /health exposing exec_mode + exod_attached, fail-closed refusing every step when exod is unreachable","agent self-report rejection in delegated mode (already-recorded path / result_acceptable), forged_status_refused on envelope-verify failure","known boundary: nested src and cross-perk sourcing perks fail closed (closure:missing) under delegated mode"],"references":["infra/settle/metered.py (meter by != exod refusal)","govd.py (serve(cfg) ExodClient seam, _ws_oversight delegate path, exec_mode guard, /health)","infra/exec/exod.py (Exod.__init__ dual-control, __main__ sidecar CLI, FileKeyStore, FileVault/SopsAgeVault)","infra/exec/closureverify.py (closure_decision, time-of-use re-hash mutation gate)","delegate.materialize_workspace, delegate._porter_sha (deleted)","grants.mint_grant","exodverify.verify_step_result","Store._persist, Store.claim_step, Store.release_step, require_closed_auth","govd_executor.serve (cooperative reference / refusing stub)","govd_client.run_delegated, run_governed","Exod(vault=...), Exod(...).serve(socket)","compiler.build_plan (credentials sourcing)","_verify_registry, skill_index.verify","keystore.FileKeyStore","deploy/setup-lightsail-node.sh, Dockerfile.body","tests/test_exod.py, test_delegate, test_sandbox.py, redteam.py, bench_bwrap","PRs #134, #135 on feat/v11-govd-delegation"]},{"doc":"docs/governed-vs-free.md","intent":"The thesis essay arguing why cyberware governs only at the moment of commitment (free for discovery, governed for commitment) rather than caging the agent loop, and why a governance substrate is structurally under-built by platforms.","concepts":["the free-loop-up-to-the-gate / accountable-past-it thesis: governance applies only at the moment of commitment (money, production, another party's system), not during discovery","the governance substrate underneath the agent loop: provenance, determinism, refusal, auditability as load-bearing-from-foundation rather than bolt-on","value-free planning: govd blesses a plan carrying no code and no secrets, agent runs steps from its own verified registry, nothing executable crosses the wire","authenticity chain: content-addressed (sha256) skills/files/chip, name-validated resolver and whole-skill untracked-aware gate closing supply-chain seams","contracts + model-checked blueprints proven deadlock-free by three provers (TLC, Apalache, TLAPS)","the security ladder SV-1 through SV-6 (protocol/hashing → hash-chained ledger → bubblewrap sandbox + separate execution principal → signed transparency-logged releases & revocation → model-checking → settlement)","the ouroboros / self-grading: the engine grades its own engine every build and a caught bug-class becomes a standing gate (building is running)","multi-source cartridge (cws/, general/, per-upstream dir) enabling ingest of another ecosystem's skills run governed — 'your skills, accountable'","the agent-economy argument: model as software consumer not substitute; skillChip as a vendor's third product surface past UI and API; control/monetization/liability incentives","settlement layer quote→meter→settle billed on the meter the isolated principal signed, never the agent's stopwatch","go-to-market: per-seat license as transition state vs per-run metered usage as end-state","counter-arguments answered: capability ≠ accountability, and overlay durability resting on architectural+cultural discipline","honest status: v1.1 closed, MIT-licensed chip, dogfoods its own governance, security ladder closed except the /dev/kvm-gated microVM perf brick"],"references":["govd (the governor / value-free planner)","architecture.md, SPEC.md, the homepage (cyberware.systems), the registry dashboard","the SV-1→SV-6 security ladder","TLC, Apalache, TLAPS provers","the multi-source cartridge sources cws/, general/, per-upstream dirs"]},{"doc":"docs/per-actor-acl-design.md","intent":"Design-plus-as-built reference for per-actor (per-token) capability ACLs in govd: the base ACL gate (M0 SHIPPED), and the operator-signed ACL attestation + client token-possession proof layers (M1/M2) that move run↔token↔ACL enforcement out of a compromised govd's TCB.","concepts":["SHIPPED status banner: M0 base ACL gate, M1 operator-signed attestation ceiling, M2 client token-possession proof are live on main; Phase A (scoped deny-by-default, unscoped allowed) default vs Phase B (acl_strict deny-by-default for unscoped) operator flip","per-principal acl sub-object in principals.json (skills allow-list with '*' sentinel, per-skill perks map, max_tier ceiling, secrets gate, issued_at/expires_at/revoked) carrying canonical ids and tier labels only, never the token value","pure acl_allows(acl, skill, perk, perk_tier, destructive, credentialed, strict, now) returning (ok, problem) appended to govern()'s problems[] as a hard non-self-approvable reject, plus WS-step-path re-enforcement of the live principal (revoked/expires_at) on every step_request","canonicalization at the trust boundary: validate+resolve skill AND perk to byte-identical on-disk index ids, rejecting noncanonical_name (./x, x/, macOS case-variant) so the FS isdir gate is no longer the name authority","destructive coupling (a destructive:true perk admitted only when explicitly perk-listed) and secret-axis gate (acl.secrets gates claiming a credentialed perk) as the MVP's real enforcement weight since the tier ceiling is near-inert","acl_sha recomputed from live acl fields at allow-time (sha256 of canonical {skills,perks,max_tier,secrets}, with pid+token_sha folded in for the attestation preimage), stored acl_sha only a boot self-check (acl_sha_mismatch)","four-axis tier semantics: catalog/sandbox confinement (backend_for_tier None→runsc), secret tier (plan-derived, exod refuses non-trusted), per-actor catalog-tier ceiling (_TIER_RANK), and destructive coupling","floor-monotone invariant (claim-monotone P1 + confinement-neutral P2): the ACL only adds rejections and never feeds backend selection, machine-checked via TLA+ FloorMonotone/NoUnscopedOpenUnderStrict/CeilingFailsClosed/StepReEnforced under TLC plus a property test","two DSSE envelopes relayed verbatim by govd holding neither key: operator ACL attestation (acl-attestation+json, ceiling) and client token-possession proof (token-proof+json, binding over run_id/plan_sha/step)","three-key/three-issuer separation: off-body operator acl-issuer key, per-node govd grant key, independent client-generated proof key (N ":"capability","docs":["docs/architecture.md"]},{"item":"StoreBackend six-property contract suite (conformance, round-trip, idempotent replay, reconcile-exact, torn-tail-safe, Postgres-inert) gating every adapter","kind":"flow","docs":["docs/architecture.md","docs/governance-service.md"]},{"item":"Backend / Postgres tier (PsycopgBackend inert-until-DSN, DSN-never-echoed, make_backend selection)","kind":"capability","docs":["docs/governance-service.md","docs/architecture.md"]},{"item":"No-root execution / exec-never-root (execution principal runs as non-root uid 65534 nobody)","kind":"capability","docs":["index.html","README.md","docs/architecture.md","docs/DEVELOPMENT.md"]},{"item":"Closure TOCTOU gate (exod re-derives every snippet/closure digest at time-of-use, refuses a post-grant porter/core swap)","kind":"flow","docs":["index.html","docs/containment-delegation.md","docs/architecture.md"]},{"item":"Crypto-shredding + Merkle checkpoints (SV-2 extensions: per-record AES-256-GCM DEK shredding, O(tail) Merkle cold-verify)","kind":"flow","docs":["docs/architecture.md"]},{"item":"Engine attestation existence + dual-signed release receipt binding chip release + engine attestation","kind":"capability","docs":["docs/architecture.md","docs/skills.md"]},{"item":"Token capability scope on the public surface (allowed skills, tier ceiling, destructive/secret reach; out-of-scope claim denied and not self-approvable)","kind":"capability","docs":["index.html","SKILL.md"]},{"item":"Engine attestation + mutual handshake (both principals re-measure each other's live binary, fail-closed engine_unattested on a one-byte tamper; dual-signed release_receipt binding chip release to engine attestation)","kind":"mechanism/flow","docs":["docs/architecture.md (\"The engine mutual handshake\" section, infra/cwp/engineattest.py: attest_live re-measures live digest vs signed digest; mutual_handshake fails closed to engine_unattested; release_receipt binds chip_sha to engine attestation; tri-lay <script>
const ATLAS = JSON.parse(document.getElementById('atlas-data').textContent);
const REPO = {"base": "https://github.com/rhCat/cyberware/blob", "ref": "853a3cf"};
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function repoLink(file,line){ if(!file) return null;
  return REPO.base+'/'+REPO.ref+'/'+file+(line?('#L'+line):''); }

// index functions by name + by module/name for flow-step resolution
const FN = ATLAS.functions||[], FL = ATLAS.flows||[], DOCS = ATLAS.documents||[], COV = ATLAS.coverage||{};
const byName = {};
FN.forEach(f=>{ const k=(f.name||'').split('.').pop(); if(k && !byName[k]) byName[k]=f; if(f.name && !byName[f.name]) byName[f.name]=f; });
function stepEl(name){
  const key=(name||'').split('::')[0].trim(), last=key.split('.').pop().split('/').pop();
  const f=byName[key]||byName[last]; const sp=el('span','step',esc(name));
  if(f && f.file){ const a=el('a','step lk',esc(name)); a.href=repoLink(f.file,f.line); a.target='_blank';
    a.title=(f.file||'')+(f.line?(':'+f.line):''); return a; }
  return sp;
}

// ---- stats + nav ----
const M=ATLAS._meta||{};
const statDefs=[['functions',FN.length],['flows',FL.length],['documents',DOCS.length],
  ['documented',(COV.documented||[]).length],['partial',(COV.partial||[]).length],['undocumented',(COV.undocumented||[]).length]];
$('#stats').append(...statDefs.map(([k,v])=>el('div','stat','<b>'+v+'</b><span>'+k+'</span>')));
const TABS=[['overview','Overview',(ATLAS.module_summaries||[]).length],['functions','Functions',FN.length],
  ['flows','Flows',FL.length],['coverage','Coverage',(COV.headline_gaps||[]).length+' gaps']];
let cur='overview';
TABS.forEach(([id,label,n])=>{ const t=el('div','tab'+(id==cur?' on':''),esc(label)+'<span class="n">'+n+'</span>');
  t.onclick=()=>show(id); t.id='tab-'+id; $('#nav').append(t); });
function show(id){ cur=id; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.id=='tab-'+id));
  ['overview','functions','flows','coverage'].forEach(v=>$('#view-'+v).classList.toggle('hidden',v!=id)); }

// ---- overview ----
(function(){ const v=$('#view-overview'); const cards=el('div','cards');
  (ATLAS.module_summaries||[]).forEach(m=>{ const c=el('div','card');
    const link=repoLink(m.module,null);
    c.innerHTML='<h3>'+(link?'<a href="'+link+'" target="_blank">'+esc(m.module)+'</a>':esc(m.module))+'</h3>'+
      '<div class="desc">'+esc(m.summary)+'</div>'+
      '<div class="meta"><span class="pill">'+m.n_functions+' fns</span><span class="pill">'+m.n_flows+' flows</span></div>';
    cards.append(c); });
  v.append(cards); })();

// ---- functions (searchable) ----
(function(){ const v=$('#view-functions');
  const mods=[...new Set(FN.map(f=>f.module))].sort();
  const bar=el('div','toolbar');
  bar.innerHTML='<input id="fq" placeholder="search function name or intent…" autocomplete="off">'+
    '<select id="fmod"><option value="">all modules</option>'+mods.map(m=>'<option>'+esc(m)+'</option>').join('')+'</select>'+
    '<label class="muted"><input type="checkbox" id="fpub" style="min-width:auto;flex:none"> flows only</label>'+
    '<span class="muted" id="fcount"></span>';
  v.append(bar);
  const tbl=el('table'); tbl.innerHTML='<thead><tr><th>module</th><th>function</th><th>intent</th><th>flow role</th><th></th></tr></thead><tbody id="fbody"></tbody>';
  v.append(tbl);
  function render(){ const q=$('#fq').value.toLowerCase().trim(), mod=$('#fmod').value, flo=$('#fpub').checked;
    const rows=FN.filter(f=> (!mod||f.module==mod) && (!flo||(f.flow_role&&f.flow_role.length)) &&
      (!q || (f.name||'').toLowerCase().includes(q) || (f.intent||'').toLowerCase().includes(q)));
    $('#fcount').textContent=rows.length+' / '+FN.length;
    $('#fbody').innerHTML=rows.map(f=>{ const lk=repoLink(f.file,f.line);
      const nm=lk?'<a class="fn" href="'+lk+'" target="_blank" title="'+esc((f.file||'')+(f.line?':'+f.line:''))+'">'+esc(f.name)+'</a>':'<span class="fn">'+esc(f.name)+'</span>';
      return '<tr><td class="mod">'+esc(f.module)+'</td><td>'+nm+(f.public?' <span class="badge pub">pub</span>':'')+'</td>'+
        '<td>'+esc(f.intent)+'</td><td class="role">'+esc(f.flow_role||'')+'</td>'+
        '<td>'+(f.signature?'<span class="muted" title="'+esc(f.signature)+'">ƒ</span>':'')+'</td></tr>'; }).join('');
  }
  ['fq','fmod','fpub'].forEach(id=>$('#'+id).addEventListener('input',render)); render(); })();

// ---- flows (sequence inspection) ----
(function(){ const v=$('#view-flows');
  const bar=el('div','toolbar'); bar.innerHTML='<input id="lq" placeholder="search flow name or intent…" autocomplete="off"><span class="muted" id="lcount"></span>';
  v.append(bar); const host=el('div'); host.id='lhost'; v.append(host);
  function render(){ const q=$('#lq').value.toLowerCase().trim();
    const rows=FL.filter(fl=>!q||(fl.name||'').toLowerCase().includes(q)||(fl.intent||'').toLowerCase().includes(q));
    $('#lcount').textContent=rows.length+' / '+FL.length; host.innerHTML='';
    rows.forEach(fl=>{ const d=el('div','flow');
      const head=el('div','fh','<span class="fn-name">'+esc(fl.name)+'</span><span class="mod">'+esc(fl.module||'')+'</span>');
      d.append(head); d.append(el('div','fi',esc(fl.intent)));
      const seq=el('div','seq'); (fl.sequence||[]).forEach((s,i)=>{ if(i)seq.append(el('span','arrow','→')); seq.append(stepEl(s)); });
      if(!(fl.sequence||[]).length) seq.append(el('span','muted','(no sequence)'));
      d.append(seq); host.append(d); });
  }
  $('#lq').addEventListener('input',render); render(); })();

// ---- coverage (documented vs left) ----
(function(){ const v=$('#view-coverage');
  if((COV.headline_gaps||[]).length){ const h=el('div','headline');
    h.innerHTML='<h2>⚠ headline gaps — in code, thin/absent in the public docs</h2><ol>'+
      COV.headline_gaps.map(g=>'<li>'+esc(g)+'</li>').join('')+'</ol>'; v.append(h); }
  const grid=el('div','cov');
  function col(title,items,cls,render){ const c=el('div','covcol'); c.append(el('h2',null,esc(title)+' · '+items.length));
    items.forEach(it=>{ const g=el('div','gap '+cls); g.innerHTML=render(it); c.append(g); }); return c; }
  grid.append(col('Undocumented',COV.undocumented||[],'g-red',it=>
    '<div class="it">'+esc(it.item)+'</div><div class="kd">'+esc(it.kind||'')+'</div><div class="wy">'+esc(it.why_it_matters||'')+'</div>'));
  grid.append(col('Partial',COV.partial||[],'g-amber',it=>
    '<div class="it">'+esc(it.item)+'</div><div class="wy">missing: '+esc(it.missing||'')+'</div>'+(it.covered_where?'<div class="kd">covered: '+esc(it.covered_where)+'</div>':'')));
  v.append(grid);
  const docd=el('div','covcol',''); docd.style.marginTop='18px'; docd.append(el('h2',null,'Documented · '+(COV.documented||[]).length));
  const dg=el('div','cards'); (COV.documented||[]).forEach(it=>{ const g=el('div','gap g-green');
    g.innerHTML='<div class="it">'+esc(it.item)+'</div><div class="kd">'+esc(it.kind||'')+' · '+esc((it.docs||[]).join(', '))+'</div>'; dg.append(g); });
  docd.append(dg); v.append(docd); })();
</script>
